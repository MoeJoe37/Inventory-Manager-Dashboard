<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="icon.ico">
  <link rel="shortcut icon" type="image/x-icon" href="icon.ico">
<title>هلال الشرق - كشف الحساب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --purple:#5b5ea6;--purple-l:#7b7fd4;--pf:rgba(91,94,166,.09);
  --yellow:#f5e642;--yd:#c8b800;
  --green:#38a169;--red:#e53e3e;--orange:#dd6b20;
  --bg:#0c0c18;--surf:#13132a;--surf2:#1a1a35;
  --bdr:#2d2d55;--txt:#e8e8f5;--muted:#7777aa;--shad:rgba(91,94,166,.3);
}
.light{--bg:#eeeef8;--surf:#fff;--surf2:#f4f4ff;--bdr:#d0d0ee;--txt:#111130;--muted:#6666aa;--shad:rgba(91,94,166,.1);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .3s,color .3s;}

/* ── HEADER ── */
header{background:var(--surf);border-bottom:3px solid var(--purple);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 24px var(--shad);position:sticky;top:0;z-index:200;}
.logo-row{display:flex;align-items:center;gap:13px;}
.logo-row img{height:50px;}
.brand h1{font-size:19px;font-weight:900;color:var(--purple);line-height:1.2;}
.brand p{font-size:11px;color:var(--muted);}
.header-right{display:flex;gap:10px;align-items:center;}
.theme-btn{background:var(--surf2);border:1.5px solid var(--bdr);color:var(--txt);padding:8px 20px;border-radius:50px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;transition:all .2s;}
.theme-btn:hover{background:var(--purple);color:#fff;border-color:var(--purple);}
.back-btn{background:var(--surf2);border:1.5px solid var(--bdr);color:var(--txt);padding:8px 20px;border-radius:50px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;display:none;align-items:center;gap:6px;transition:all .2s;}
.back-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}

/* ── MAIN ── */
main{max-width:1100px;margin:0 auto;padding:32px 18px 60px;}

/* ── UPLOAD ── */
.up-zone{background:var(--surf);border:2.5px dashed var(--bdr);border-radius:20px;padding:48px 36px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:24px;position:relative;overflow:hidden;}
.up-zone::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 25% 60%,rgba(91,94,166,.09) 0%,transparent 65%),radial-gradient(ellipse at 75% 40%,rgba(245,230,66,.05) 0%,transparent 65%);}
.up-zone:hover,.up-zone.over{border-color:var(--purple);box-shadow:0 0 0 5px rgba(91,94,166,.12);}
.up-zone .ico{font-size:46px;display:block;margin-bottom:12px;}
.up-zone h2{font-size:19px;font-weight:800;margin-bottom:7px;}
.up-zone p{color:var(--muted);font-size:13px;margin-bottom:20px;}
#fileInput{display:none;}
.btn-up{background:var(--purple);color:#fff;padding:11px 30px;border-radius:50px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:800;border:none;cursor:pointer;box-shadow:0 4px 18px rgba(91,94,166,.45);transition:all .2s;}
.btn-up:hover{transform:translateY(-2px);}

/* ── TOOLBAR ── */
.toolbar{display:none;background:var(--surf);border:1.5px solid var(--bdr);border-radius:16px;padding:18px 22px;margin-bottom:18px;box-shadow:0 4px 20px var(--shad);}
.toolbar-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.toolbar h3{font-size:16px;font-weight:800;color:var(--purple);white-space:nowrap;}
.search-box{flex:1;min-width:200px;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:10px;padding:9px 14px;font-family:'Cairo',sans-serif;font-size:14px;color:var(--txt);outline:none;transition:border-color .2s;}
.search-box:focus{border-color:var(--purple);}
.search-box::placeholder{color:var(--muted);}
.count-badge{background:var(--pf);border:1px solid var(--purple);color:var(--purple);padding:5px 14px;border-radius:50px;font-size:12px;font-weight:700;white-space:nowrap;}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.filter-label{font-size:13px;color:var(--muted);white-space:nowrap;}
.fbtn{background:var(--surf2);border:1.5px solid var(--bdr);color:var(--txt);padding:6px 16px;border-radius:50px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;transition:all .2s;}
.fbtn:hover,.fbtn.on{background:var(--purple);color:#fff;border-color:var(--purple);}
.cust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:11px;max-height:500px;overflow-y:auto;padding-bottom:4px;}
.cust-grid::-webkit-scrollbar{width:5px;}
.cust-grid::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px;}
.ctile{background:var(--surf2);border:2px solid var(--bdr);border-radius:13px;padding:14px 18px;cursor:pointer;transition:all .2s;}
.ctile:hover,.ctile.sel{border-color:var(--purple);background:rgba(91,94,166,.1);box-shadow:0 0 0 3px rgba(91,94,166,.18);}
.ctile .cn{font-weight:800;font-size:14px;line-height:1.4;}
.ctile .ci{font-size:11px;color:var(--muted);margin-top:2px;}
.ctile .cb{margin-top:8px;font-size:12px;font-weight:800;display:flex;align-items:center;gap:5px;}
.cb.pos{color:#e53e3e;}.cb.zero{color:var(--green);}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.dot.pos{background:#e53e3e;}.dot.zero{background:var(--green);}
.btn-gen{width:100%;margin-top:18px;background:linear-gradient(135deg,var(--purple) 0%,var(--purple-l) 100%);color:#fff;padding:14px;border-radius:13px;font-family:'Cairo',sans-serif;font-size:16px;font-weight:900;border:none;cursor:pointer;box-shadow:0 6px 22px rgba(91,94,166,.5);transition:all .25s;display:none;}
.btn-gen:hover{transform:translateY(-2px);}

/* ── PREVIEW ── */
#prevSec{display:none;margin-top:26px;}
.prev-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.prev-bar h3{font-size:17px;font-weight:800;}
.prev-actions{display:flex;gap:10px;align-items:center;}
.btn-back-rpt{background:var(--surf2);border:1.5px solid var(--bdr);color:var(--txt);padding:10px 22px;border-radius:50px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
.btn-back-rpt:hover{background:var(--purple);color:#fff;border-color:var(--purple);}
.btn-dl{background:linear-gradient(135deg,#c8b800 0%,var(--yellow) 100%);color:#1a1a00;padding:11px 28px;border-radius:50px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(200,184,0,.4);transition:all .2s;}
.btn-dl:hover{transform:translateY(-2px);}

/* ═══════════════════════════════════
   PDF DOCUMENT
═══════════════════════════════════ */
#pdfWrap{background:#fff;color:#1a1a2e;border-radius:14px;overflow:hidden;box-shadow:0 10px 50px rgba(0,0,0,.3);font-family:'Cairo',sans-serif;direction:rtl;max-width:960px;margin:0 auto;}
/* header */
.ph{background:#fff;padding:20px 26px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #5b5ea6;}
.ph-co h2{font-size:21px;font-weight:900;color:#5b5ea6;}
.ph-co p{font-size:11.5px;color:#888;}
.ph-logo{height:56px;}
.ph-badge{background:#5b5ea6;color:#fff;padding:9px 16px;border-radius:9px;font-size:14px;font-weight:800;text-align:center;direction:ltr;}
.ph-badge small{display:block;font-size:10px;opacity:.8;direction:rtl;margin-top:2px;}
/* title bar */
.ptb{background:#5b5ea6;color:#fff;text-align:center;padding:9px;font-size:16px;font-weight:800;}
/* customer box */
.pcb{background:#f5f5ff;padding:13px 26px;border-bottom:1px solid #e0e0f0;}
.pcb h3{font-size:18px;font-weight:900;color:#1a1a2e;}
.pcb .per{font-size:12px;color:#888;margin-top:3px;}
/* opening balance banner */
.ob-row{background:#fffbea;border-bottom:2px solid #e0d080;padding:10px 26px;display:flex;justify-content:space-between;align-items:center;}
.ob-row .ob-lbl{font-size:13px;font-weight:700;color:#7a6000;display:flex;align-items:center;gap:7px;}
.ob-row .ob-lbl::before{content:'📂';font-size:14px;}
.ob-row .ob-vals{display:flex;gap:28px;}
.ob-row .ob-item{text-align:center;}
.ob-row .ob-item .ov{font-size:15px;font-weight:900;color:#5b5ea6;}
.ob-row .ob-item .ov.neg{color:#e53e3e;}
.ob-row .ob-item .ok{font-size:10px;color:#888;margin-top:1px;}
/* table */
.ptw{padding:0 18px 16px;overflow-x:auto;}
table.pt{width:100%;border-collapse:collapse;font-size:12px;direction:rtl;border:2px solid #5b5ea6;}
table.pt thead tr{background:#5b5ea6;color:#fff;}
table.pt thead th{padding:9px 7px;font-weight:700;text-align:center;white-space:nowrap;font-size:11.5px;border:1.5px solid rgba(255,255,255,.3);}
table.pt tbody tr:nth-child(even){background:#f8f8ff;}
table.pt td{padding:8px 7px;text-align:center;border:1px solid #c8c8e0;}
table.pt td.inv{color:#5b5ea6;font-weight:700;}
table.pt td.pay{color:#38a169;font-weight:700;}
table.pt td.ret{color:#e53e3e;font-weight:700;}
table.pt td.adj{color:#dd6b20;font-weight:700;}
table.pt td.deb{color:#5b5ea6;font-weight:700;}
table.pt td.crd{color:#38a169;font-weight:700;}
table.pt td.bal{font-weight:700;color:#222;}
table.pt td.desc{text-align:right;max-width:220px;font-size:11px;line-height:1.4;}
/* opening balance row inside table */
table.pt tr.ob-tr td{background:#fffbea !important;font-weight:800;color:#7a6000;font-size:12px;border:1px solid #e0d080;}
/* summary */
.pas{margin:0 18px 14px;border:1.5px solid #d0d0e8;border-radius:11px;overflow:hidden;}
.pas-ttl{background:#efefff;padding:9px 18px;font-size:13px;font-weight:800;color:#222;border-bottom:1.5px solid #d0d0e8;text-align:center;}
.pas-r{display:flex;justify-content:space-between;padding:7px 18px;border-bottom:1px solid #ebebf5;font-size:13px;}
.pas-r:last-child{border:none;}
.pas-r .lb{color:#555;}.pas-r .vl{font-weight:800;color:#222;}
.pas-r.out .lb,.pas-r.out .vl{color:#e53e3e;font-size:14px;}
/* aging */
.aging-wrap{margin:0 18px 14px;}
.aging-ttl{background:#fff3e0;border:1.5px solid #f6ad55;border-radius:11px 11px 0 0;padding:9px 18px;font-size:13px;font-weight:800;color:#7b3f00;text-align:center;border-bottom:1.5px solid #f6ad55;}
.aging-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1.5px solid #f6ad55;border-top:none;border-radius:0 0 11px 11px;overflow:hidden;}
.aging-cell{padding:14px 10px;text-align:center;background:#fff;border-left:1px solid #f6ad55;}
.aging-cell:last-child{border-left:none;}
.aging-cell .albl{font-size:11px;color:#888;margin-bottom:3px;}
.aging-cell .aval{font-size:17px;font-weight:900;}
.aging-cell .aval.a0{color:#38a169;}.aging-cell .aval.a30{color:#d69e2e;}
.aging-cell .aval.a60{color:#dd6b20;}.aging-cell .aval.a90{color:#e53e3e;}
.aging-cell .adays{font-size:10px;color:#aaa;margin-top:2px;}
/* 4 boxes */
.psg{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#d0d0e0;margin:0 18px 18px;border-radius:11px;overflow:hidden;border:1.5px solid #d0d0e0;}
.psc{background:#fff;padding:13px 8px;text-align:center;}
.psc .lar{font-size:11.5px;color:#555;font-weight:700;}.psc .len{font-size:10px;color:#999;margin-bottom:5px;}
.psc .val{font-size:20px;font-weight:900;color:#5b5ea6;}
.psc .val.out{color:#e53e3e;}.psc .val.col{color:#38a169;}
/* signatures */
.sig-section{margin:0 18px 22px;border:1.5px solid #d0d0e8;border-radius:11px;overflow:hidden;}
.sig-ttl{background:#f5f5ff;padding:9px 18px;font-size:13px;font-weight:800;color:#333;border-bottom:1.5px solid #d0d0e8;text-align:center;}
.sig-grid{display:grid;grid-template-columns:repeat(3,1fr);}
.sig-box{padding:22px 18px 16px;text-align:center;border-left:1px solid #e0e0f0;}
.sig-box:last-child{border-left:none;}
.sig-line{border-bottom:1.5px solid #888;margin:0 10px 10px;height:40px;}
.sig-lbl{font-size:12.5px;font-weight:700;color:#444;}
/* footer */
.pft{background:#f5f5ff;border-top:2px solid #5b5ea6;padding:12px 26px;text-align:center;font-size:11.5px;color:#888;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;padding:13px 26px;border-radius:12px;font-size:14px;font-weight:700;z-index:999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.3);text-align:center;}
.toast.error{background:#e53e3e;}
.toast.warn{background:#dd6b20;}
</style>
</head>
<body>
<header>
  <div class="logo-row">
    <img id="hLogo" src="" alt="هلال الشرق">
    <div class="brand">
      <h1>هلال الشرق للتجارة</h1>
      <p>Hilal Al-Sharq Trading • Baghdad, Iraq</p>
    </div>
  </div>
  <div class="header-right">
    <a class="back-btn" id="homeBtn" href="index.html" style="display:flex;text-decoration:none">🏠 الرئيسية</a>
    <button class="back-btn" id="headerBackBtn" onclick="goBack()">← رجوع</button>
    <button class="theme-btn" onclick="toggleTheme()">
      <span id="tIco">☀️</span><span id="tLbl">وضع النهار</span>
    </button>
  </div>
</header>

<div class="toast" id="toast"></div>

<main>
  <!-- Upload -->
  <div class="up-zone" id="upZone"
    onclick="document.getElementById('fileInput').click()"
    ondragover="event.preventDefault();this.classList.add('over')"
    ondragleave="this.classList.remove('over')"
    ondrop="onDrop(event)">
    <span class="ico">📊</span>
    <h2>رفع ملف دفتر الأستاذ العام</h2>
    <p>يدعم ملفات Excel بالعربية والإنجليزية مع عملاء متعددين<br>
       <small style="color:var(--muted)">الصيغ المدعومة: .xlsx | .xls فقط</small></p>
    <button class="btn-up" onclick="event.stopPropagation();document.getElementById('fileInput').click()">📂 اختيار الملف</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFileInput(this)">
  </div>

  <!-- Customer list -->
  <div class="toolbar" id="toolbar">
    <div class="toolbar-top">
      <h3>👤 اختر العميل</h3>
      <input class="search-box" id="searchBox" placeholder="🔍 ابحث باسم العميل أو رقم الحساب..." oninput="renderGrid()">
      <span class="count-badge" id="cntBadge">0 عميل</span>
    </div>
    <div class="filter-row">
      <span class="filter-label">فلتر:</span>
      <button class="fbtn on" id="fAll"   onclick="setF('all')">الكل</button>
      <button class="fbtn"    id="fOwing" onclick="setF('owing')">⚠️ رصيد مستحق</button>
      <button class="fbtn"    id="fClear" onclick="setF('clear')">✅ رصيد صفر</button>
    </div>
    <div class="cust-grid" id="custGrid"></div>
    <button class="btn-gen" id="genBtn" onclick="generate()">🖨️ إنشاء كشف الحساب</button>
  </div>

  <!-- Preview -->
  <div id="prevSec">
    <div class="prev-bar">
      <h3>📄 معاينة كشف الحساب</h3>
      <div class="prev-actions">
        <button class="btn-back-rpt" onclick="goBackToList()">← العودة للقائمة</button>
        <button class="btn-dl" onclick="dlPDF()">⬇️ تحميل PDF</button>
      </div>
    </div>
    <div id="pdfWrap"></div>
  </div>
</main>

/* ── FILE VALIDATION ── */
function validateAndLoad(file){
  const name=file.name||'';
  const ext=name.split('.').pop().toLowerCase();
  if(ext!=='xlsx'&&ext!=='xls'){
    showToast('⚠️ صيغة الملف غير صحيحة! يُقبل فقط .xlsx أو .xls','warn');
    document.getElementById('fileInput').value='';
    return;
  }
  loadFile(file);
}

/* ── LOAD ── */
function loadFile(file){
  const reader=new FileReader();
  reader.onerror=()=>showToast('خطأ في قراءة الملف');
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:false});
      parseSheet(wb.Sheets[wb.SheetNames[0]]);
      document.getElementById('upZone').style.display='none';
      document.getElementById('headerBackBtn').style.display='flex';
    }catch(err){showToast('خطأ في تحليل الملف: '+err.message);console.error(err);}
  };
  reader.readAsArrayBuffer(file);
}

/* ── DATE PARSING ── */
function parseDate(v){
  if(!v&&v!==0)return null;
  if(typeof v==='number'&&v>1000){
    const d=new Date(Math.round((v-25569)*86400*1000));
    if(isNaN(d.getTime()))return null;
    const dd=String(d.getUTCDate()).padStart(2,'0');
    const mm=String(d.getUTCMonth()+1).padStart(2,'0');
    return{display:`${dd}/${mm}/${d.getUTCFullYear()}`,ts:d.getTime()};
  }
  const s=String(v).trim();
  if(!s)return null;
  const arM=s.match(/(\d{1,2})\s+([\u0600-\u06FF]+)[,،]?\s*(\d{4})/);
  if(arM){
    const day=parseInt(arM[1]),mon=AR_MONTHS[arM[2]]||1,yr=parseInt(arM[3]);
    const d=new Date(Date.UTC(yr,mon-1,day));
    return{display:`${String(day).padStart(2,'0')}/${String(mon).padStart(2,'0')}/${yr}`,ts:d.getTime()};
  }
  const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso){
    const d=new Date(Date.UTC(+iso[1],+iso[2]-1,+iso[3]));
    return{display:`${iso[3]}/${iso[2]}/${iso[1]}`,ts:d.getTime()};
  }
  return null;
}

function numVal(v){
  if(v===null||v===undefined||v==='')return 0;
  const n=parseFloat(String(v).replace(/,/g,''));
  return isNaN(n)?0:n;
}
function fmt(n){return Number(n).toLocaleString('en-US');}

/* ── TYPE DETECTION ── */
function getType(doc,comm){
  const d=String(doc||'').trim();
  const c=String(comm||'').trim();
  if(/MISC/i.test(c)||/MISC/i.test(d))return 'تسوية';
  if(/سداد|payment/i.test(c))return 'دفعة';
  if(/^RRINV\//i.test(d))return 'مرتجع';
  if(/^INV\//i.test(d))return 'فاتورة';
  if(/^(CHSJB|WHKH|CHHAD|B\d)\//i.test(d))return 'دفعة';
  return '';
}

/* ── PARSE SHEET ── */
function parseSheet(sheet){
  // Use defval:'' so every cell is a string or number, never null/undefined
  // raw:true keeps numbers as numbers and strings as strings
  const rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:'',raw:true});
  allC=[];
  let cur=null;

  const TOTAL_PREFIX=['الإجمالي','Total '];
  const OB_KEYS=['الرصيد الافتتاحي','Initial Balance'];

  // Helper: is a value truly empty (null, undefined, '', NaN)
  function isEmpty(v){return v===null||v===undefined||v===''||v!==v;}

  // Helper: is a value a real number (not NaN, not empty string)
  function isNum(v){return typeof v==='number'&&!isNaN(v);}

  // Helper: does row have numeric totals in cols 7,8,9
  function rowHasTotals(r){return isNum(r[7])||isNum(r[8])||isNum(r[9]);}

  // Helper: is col1 (date cell) empty for this row
  function col1Empty(r){return isEmpty(r[1]);}

  console.log(`Parsing ${rows.length} rows...`);

  for(let i=0;i<rows.length;i++){
    const r=rows[i];

    // col0: always stringify, trim
    const c0=isEmpty(r[0])?'':String(r[0]).trim();
    if(!c0)continue;

    // Skip column-header rows
    if(c0===''||r[1]==='التاريخ'||r[1]==='Date')continue;

    // Skip total/summary rows
    if(TOTAL_PREFIX.some(p=>c0.startsWith(p)))continue;

    // ── Opening balance row
    if(OB_KEYS.includes(c0)){
      if(cur){
        cur.openingDebit  =numVal(r[7]);
        cur.openingCredit =numVal(r[8]);
        cur.openingBalance=numVal(r[9]);
      }
      continue;
    }

    const dateObj=parseDate(r[1]);
    const hasTotals=rowHasTotals(r);
    const noDate=col1Empty(r)||!dateObj;

    // ── Customer header: c1 is empty AND row has numeric totals cols 7-9
    if(noDate&&hasTotals){
      const m=c0.match(/^(\d+)\s+(.*)/);
      cur={
        id:            m?m[1]:c0,
        name:          m?m[2].trim():c0,
        totalDebit:    numVal(r[7]),
        totalCredit:   numVal(r[8]),
        balance:       numVal(r[9]),
        openingDebit:  0,
        openingCredit: 0,
        openingBalance:0,
        txns:[]
      };
      allC.push(cur);
      console.log(`  Customer: ${cur.name} | bal=${cur.balance}`);
      continue;
    }

    // ── Transaction row: has a parseable date AND belongs to a customer
    if(cur&&dateObj){
      const doc   =c0;
      const comm  =isEmpty(r[2])?'':String(r[2]).replace(/\u00a0/g,' ').trim();
      const srcDoc=isEmpty(r[5])?'':String(r[5]).trim();
      // col7=debit, col8=credit, col9=balance
      const debit =numVal(r[7]);
      const credit=numVal(r[8]);
      const bal   =numVal(r[9]);
      const type  =getType(doc,comm);
      cur.txns.push({doc,date:dateObj.display,ts:dateObj.ts,desc:comm||doc,srcDoc,debit,credit,bal,type});
    }
  }

  console.log(`Parsed ${allC.length} customers`);
  if(allC.length===0){
    showToast('⚠️ لم يتم العثور على عملاء في الملف. تأكد من التنسيق.');
    return;
  }
  document.getElementById('toolbar').style.display='block';
  renderGrid();
}

/* ── AGING ── */
function calcAging(txns,balance,today){
  let lastPayTS=null;
  for(let t of txns){if(t.type==='دفعة'&&t.ts)lastPayTS=t.ts;}
  if(balance<=0)return{days:0,lastPayDate:'—',d0:0,d30:0,d60:0,d90:0};
  const daysSince=lastPayTS?Math.floor((today-lastPayTS)/(864e5)):null;
  const lastPayDate=lastPayTS?tsToDisplay(lastPayTS):'لا يوجد';
  let d0=0,d30=0,d60=0,d90=0,remaining=balance;
  const invoices=[...txns].filter(t=>t.type==='فاتورة').reverse();
  for(let inv of invoices){
    if(remaining<=0)break;
    const amt=Math.min(inv.debit,remaining);remaining-=amt;
    const age=Math.floor((today-inv.ts)/(864e5));
    if(age<=30)d0+=amt;else if(age<=60)d30+=amt;else if(age<=90)d60+=amt;else d90+=amt;
  }
  if(remaining>0)d90+=remaining;
  return{days:daysSince,lastPayDate,d0,d30,d60,d90};
}
function tsToDisplay(ts){
  const d=new Date(ts);
  return String(d.getUTCDate()).padStart(2,'0')+'/'+String(d.getUTCMonth()+1).padStart(2,'0')+'/'+d.getUTCFullYear();
}

/* ── FILTER + RENDER ── */
function setF(f){
  curFilter=f;
  ['All','Owing','Clear'].forEach(x=>document.getElementById('f'+x).classList.toggle('on',f===x.toLowerCase()));
  renderGrid();
}
function renderGrid(){
  const q=document.getElementById('searchBox').value.trim().toLowerCase();
  const list=allC.filter(c=>{
    const mq=!q||c.name.toLowerCase().includes(q)||c.id.includes(q);
    const mf=curFilter==='all'||(curFilter==='owing'&&c.balance>0)||(curFilter==='clear'&&c.balance<=0);
    return mq&&mf;
  });
  document.getElementById('cntBadge').textContent=list.length+' عميل';
  const grid=document.getElementById('custGrid');
  grid.innerHTML='';chosen=null;
  document.getElementById('genBtn').style.display='none';
  if(list.length===0){
    grid.innerHTML='<div style="padding:28px;text-align:center;color:var(--muted);grid-column:1/-1;">لا توجد نتائج</div>';
    return;
  }
  list.forEach(c=>{
    const pos=c.balance>0;
    const d=document.createElement('div');
    d.className='ctile';
    d.innerHTML=`<div class="cn">${c.name}</div><div class="ci">رقم الحساب: ${c.id}</div>
      <div class="cb ${pos?'pos':'zero'}"><span class="dot ${pos?'pos':'zero'}"></span>
      ${pos?'رصيد مستحق: '+fmt(c.balance)+' د.ع':'✔ لا يوجد رصيد مستحق'}</div>`;
    d.onclick=()=>{
      document.querySelectorAll('.ctile').forEach(t=>t.classList.remove('sel'));
      d.classList.add('sel');chosen=c;
      document.getElementById('genBtn').style.display='block';
    };
    grid.appendChild(d);
  });
}
