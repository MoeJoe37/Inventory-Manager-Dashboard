<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <link rel="icon" type="image/x-icon" href="icon.ico">
  <link rel="shortcut icon" type="image/x-icon" href="icon.ico">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>General Ledger Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --bg4: #2d3149;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf6;
    --text2: #9fa3c0;
    --text3: #6b6f8a;
    --accent: #5c7cfa;
    --accent2: #4263d0;
    --green: #40c57a;
    --green-bg: rgba(64,197,122,0.12);
    --red: #f06060;
    --red-bg: rgba(240,96,96,0.12);
    --amber: #f0a040;
    --amber-bg: rgba(240,160,64,0.12);
    --teal: #3ecfb8;
    --teal-bg: rgba(62,207,184,0.12);
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  [data-theme="light"] {
    --bg: #f0f2f9;
    --bg2: #ffffff;
    --bg3: #f5f6fc;
    --bg4: #eaecf8;
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.13);
    --text: #1a1d30;
    --text2: #52567a;
    --text3: #9094b0;
    --accent: #4263d0;
    --accent2: #3352b0;
    --green: #1a9951;
    --green-bg: rgba(26,153,81,0.10);
    --red: #d03030;
    --red-bg: rgba(208,48,48,0.10);
    --amber: #c07000;
    --amber-bg: rgba(192,112,0,0.10);
    --teal: #0d9e89;
    --teal-bg: rgba(13,158,137,0.10);
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }
  body.rtl { direction: rtl; font-family: 'Cairo', system-ui, sans-serif; }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 16px;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn-icon {
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2);
    font-size: 16px;
    transition: all 0.15s;
  }
  .btn-icon:hover { background: var(--bg4); color: var(--text); }
  .btn-lang {
    height: 36px;
    padding: 0 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg3);
    cursor: pointer;
    color: var(--text2);
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .btn-lang:hover { background: var(--bg4); color: var(--text); }

  main { padding: 28px; max-width: 1400px; margin: 0 auto; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border2);
    border-radius: var(--radius);
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg2);
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--bg3); }
  .upload-icon { font-size: 48px; margin-bottom: 16px; }
  .upload-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  .upload-sub { font-size: 14px; color: var(--text2); }
  .upload-hint { font-size: 12px; color: var(--text3); margin-top: 8px; }
  #file-input { display: none; }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .stat-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.3px; text-transform: uppercase; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.accent { color: var(--accent); }

  /* Controls */
  .controls-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 220px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    height: 38px;
    padding: 0 14px 0 38px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border 0.15s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 16px;
    pointer-events: none;
  }
  body.rtl .search-box input { padding: 0 38px 0 14px; }
  body.rtl .search-icon { left: auto; right: 12px; }

  .filter-btn {
    height: 38px;
    padding: 0 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg2);
    cursor: pointer;
    color: var(--text2);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { background: var(--bg3); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Table */
  .table-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--bg3); }
  thead th {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  body.rtl thead th { text-align: right; }
  thead th.sortable { cursor: pointer; user-select: none; }
  thead th.sortable:hover { color: var(--text2); background: var(--bg4); }
  thead th.sort-active { color: var(--accent) !important; }
  .sort-arrow { display: inline-block; margin-left: 4px; font-size: 10px; opacity: 0.4; transition: opacity 0.15s; }
  .sort-arrow.active { opacity: 1; color: var(--accent); }
  body.rtl .sort-arrow { margin-left: 0; margin-right: 4px; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }
  td {
    padding: 13px 16px;
    font-size: 13.5px;
    color: var(--text);
    vertical-align: middle;
  }
  .customer-name { font-weight: 600; font-size: 14px; }
  .customer-id { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .amount { font-weight: 700; font-size: 14px; font-variant-numeric: tabular-nums; }
  .amount.positive { color: var(--green); }
  .amount.zero { color: var(--text3); }
  .amount.negative { color: var(--red); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-gray { background: var(--bg4); color: var(--text3); }

  .date-text { font-size: 12.5px; color: var(--text2); white-space: nowrap; }

  /* Expandable row */
  .expand-row { display: none; }
  .expand-row.open { display: table-row; }
  .expand-cell {
    padding: 0;
    background: var(--bg3);
  }
  .expand-inner {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
  }
  .detail-block { }
  .detail-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
  .detail-value { font-size: 14px; color: var(--text); font-weight: 500; }

  /* Transactions mini-table inside expanded row */
  .mini-section { margin-top: 14px; }
  .mini-section-title { font-size: 12px; font-weight: 600; color: var(--text3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.3px; }
  .mini-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .mini-table th { color: var(--text3); padding: 4px 8px; text-align: left; font-weight: 500; }
  body.rtl .mini-table th { text-align: right; }
  .mini-table td { padding: 5px 8px; border-top: 1px solid var(--border); color: var(--text2); }
  .mini-table td.debit { color: var(--red); font-weight: 600; }
  .mini-table td.credit { color: var(--green); font-weight: 600; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 15px; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }

  /* Chevron */
  .chev { display: inline-block; transition: transform 0.2s; color: var(--text3); font-size: 12px; }
  .chev.open { transform: rotate(90deg); }

  @media (max-width: 700px) {
    main { padding: 16px; }
    header { padding: 0 16px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    td:nth-child(n+4) { display: none; }
    th:nth-child(n+4) { display: none; }
  }

  /* Print overlay */
  #print-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  #print-overlay.show { display: flex; }
  #print-frame {
    background: #fff;
    color: #111;
    border-radius: var(--radius);
    padding: 32px;
    width: 92vw;
    max-width: 960px;
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
  }
  #print-frame h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: #111; }
  #print-frame .print-meta { font-size: 12px; color: #666; margin-bottom: 20px; }
  #print-frame table { width: 100%; border-collapse: collapse; font-size: 13px; border: 2px solid #3f4282; }
  #print-frame thead th {
    background: #1a1d27; color: #e8eaf6;
    padding: 10px 12px; text-align: left; font-size: 11px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
    border: 1px solid #3f4282;
  }
  #print-frame.rtl thead th { text-align: right; }
  #print-frame tbody tr:nth-child(even) { background: #f5f6fc; }
  #print-frame tbody td { padding: 9px 12px; border: 1px solid #d0d2e8; color: #222; }
  #print-frame .rtl td { text-align: right; }
  #print-frame .bal-pos { color: #d03030; font-weight: 700; }
  #print-frame .bal-zero { color: #1a9951; font-weight: 700; }
  #print-frame .print-actions { display: flex; gap: 10px; margin-bottom: 20px; }
  #print-frame .print-actions button {
    height: 36px; padding: 0 16px; border-radius: 6px; border: 1px solid #ccd;
    background: #f0f2f9; cursor: pointer; font-size: 13px; font-weight: 600; color: #333;
  }
  #print-frame .print-actions .btn-doit { background: #4263d0; color: #fff; border-color: #4263d0; }
  #print-frame .print-actions .btn-doit:hover { background: #3352b0; }
  #print-frame .print-actions button:hover { background: #e0e2ef; }
  #print-frame .print-summary {
    display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
  }
  #print-frame .ps-card {
    background: #f0f2f9; border-radius: 8px; padding: 10px 16px; min-width: 120px;
  }
  #print-frame .ps-label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
  #print-frame .ps-val { font-size: 18px; font-weight: 700; color: #111; }

  @media print {
    body > * { display: none !important; }
    #print-overlay { display: block !important; position: static !important; background: none !important; }
    #print-frame { max-height: none; overflow: visible; box-shadow: none; width: 100%; border-radius: 0; padding: 0; }
    #print-frame .print-actions { display: none !important; }
  }
</style>
</head>
<body data-theme="dark">

<header>
  <div class="logo">
    <div class="logo-icon">📊</div>
    <span id="app-title">Ledger Analyzer</span>
  </div>
  <div class="header-actions">
    <a href="index.html" class="btn-lang" style="text-decoration:none;" id="btn-home">🏠 الرئيسية</a>
    <button class="btn-lang" onclick="toggleLang()" id="lang-btn">AR / عر</button>
    <button class="btn-icon" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">🌙</button>
  </div>
</header>

<main>
  <div id="upload-section">
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📂</div>
      <div class="upload-title" id="uz-title">Drop your Excel file here</div>
      <div class="upload-sub" id="uz-sub">or click to browse</div>
      <div class="upload-hint" id="uz-hint">Supports English &amp; Arabic General Ledger exports (.xlsx)</div>
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFile(event)"/>
  </div>

  <div id="data-section" style="display:none;">
    <div class="stats-row" id="stats-row"></div>

    <div class="controls-row">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Search customers…" oninput="renderTable()"/>
      </div>
      <button class="filter-btn active" id="f-all" onclick="setFilter('all')" data-ar="الكل" data-en="All">All</button>
      <button class="filter-btn" id="f-balance" onclick="setFilter('balance')" data-ar="لديه رصيد" data-en="Has balance">Has balance</button>
      <button class="filter-btn" id="f-zero" onclick="setFilter('zero')" data-ar="لا رصيد" data-en="Zero balance">Zero balance</button>
      <button class="filter-btn" id="btn-upload-new" onclick="resetUpload()" data-ar="ملف جديد" data-en="New file">New file</button>
      <button class="filter-btn" id="btn-print" onclick="printTable()">🖨 Print</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr id="table-head"></tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div class="empty" id="empty-msg" style="display:none;" data-ar="لا توجد نتائج" data-en="No results found">No results found</div>
    </div>
  </div>
</main>

<div id="print-overlay">
  <div id="print-frame">
    <div class="print-actions">
      <button class="btn-doit" onclick="window.print()">🖨 Print / Save PDF</button>
      <button onclick="closePrint()">✕ Close</button>
    </div>
    <h2 id="print-title">General Ledger — Customer Analysis</h2>
    <div class="print-meta" id="print-meta"></div>
    <div class="print-summary" id="print-summary"></div>
    <table id="print-table">
      <thead id="print-thead"></thead>
      <tbody id="print-tbody"></tbody>
    </table>
  </div>
</div>

<script>
let customers = [];
let filter = 'all';
let lang = 'ar';
let isDark = true;
let openRow = null;
let sortField = null;
let sortDir = 1;

const T = {
  en: {
    appTitle: 'Ledger Analyzer',
    uzTitle: 'Drop your Excel file here',
    uzSub: 'or click to browse',
    uzHint: 'Supports English & Arabic General Ledger exports (.xlsx)',
    totalCustomers: 'Total Customers',
    withBalance: 'With Balance',
    noBalance: 'Cleared',
    totalBalance: 'Total Balance',
    cols: ['Customer', 'Balance', 'Last Invoice', 'Invoice Date', 'Last Payment', 'Payment Date'],
    all: 'All', hasBalance: 'Has balance', zeroBalance: 'Zero balance', newFile: 'New file',
    search: 'Search customers…',
    noResults: 'No results found',
    detInvoice: 'Last Invoice', detInvDate: 'Invoice Date', detPayment: 'Last Payment',
    detPayDate: 'Payment Date', detBalance: 'Current Balance', detTxn: 'All Transactions',
    txnRef: 'Reference', txnDate: 'Date', txnType: 'Type', txnDebit: 'Debit', txnCredit: 'Credit',
    typeInvoice: 'Invoice', typeReturn: 'Return', typePayment: 'Payment', typeOther: 'Other',
    loading: 'Processing file…',
  },
  ar: {
    appTitle: 'محلل الأستاذ العام',
    uzTitle: 'اسحب ملف Excel هنا',
    uzSub: 'أو انقر للاختيار',
    uzHint: 'يدعم ملفات دفتر الأستاذ العام (.xlsx)',
    totalCustomers: 'إجمالي العملاء',
    withBalance: 'لديهم رصيد',
    noBalance: 'صفر',
    totalBalance: 'إجمالي الأرصدة',
    cols: ['العميل', 'الرصيد', 'آخر فاتورة', 'تاريخ الفاتورة', 'آخر دفعة', 'تاريخ الدفعة'],
    all: 'الكل', hasBalance: 'لديه رصيد', zeroBalance: 'لا رصيد', newFile: 'ملف جديد',
    search: 'بحث عن عميل…',
    noResults: 'لا توجد نتائج',
    detInvoice: 'آخر فاتورة', detInvDate: 'تاريخ الفاتورة', detPayment: 'آخر دفعة',
    detPayDate: 'تاريخ الدفعة', detBalance: 'الرصيد الحالي', detTxn: 'جميع الحركات',
    txnRef: 'المرجع', txnDate: 'التاريخ', txnType: 'النوع', txnDebit: 'مدين', txnCredit: 'دائن',
    typeInvoice: 'فاتورة', typeReturn: 'مرتجع', typePayment: 'سداد', typeOther: 'أخرى',
    loading: 'جاري معالجة الملف…',
  }
};

function t(key) { return T[lang][key] || key; }

function toggleTheme() {
  isDark = !isDark;
  document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
}

function toggleLang() {
  lang = lang === 'en' ? 'ar' : 'en';
  document.body.classList.toggle('rtl', lang === 'ar');
  document.documentElement.setAttribute('lang', lang);
  document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
  applyLang();
}

function applyLang() {
  document.getElementById('app-title').textContent = t('appTitle');
  document.getElementById('uz-title').textContent = t('uzTitle');
  document.getElementById('uz-sub').textContent = t('uzSub');
  document.getElementById('uz-hint').textContent = t('uzHint');
  document.getElementById('search').placeholder = t('search');
  document.getElementById('f-all').textContent = t('all');
  document.getElementById('f-balance').textContent = t('hasBalance');
  document.getElementById('f-zero').textContent = t('zeroBalance');
  document.getElementById('btn-home').textContent = lang === 'ar' ? '🏠 الرئيسية' : '🏠 Home';
  document.getElementById('btn-upload-new').textContent = t('newFile');
  document.getElementById('btn-print').textContent = lang === 'ar' ? '🖨 طباعة' : '🖨 Print';
  if (customers.length > 0) { renderStats(); renderTable(); }
}

// Drag and drop
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });

function handleFile(ev) { if(ev.target.files[0]) processFile(ev.target.files[0]); }

function processFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
    const sheetName = wb.SheetNames[0];
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, dateNF: 'yyyy-mm-dd' });
    customers = parseRows(rows);
    document.getElementById('upload-section').style.display = 'none';
    document.getElementById('data-section').style.display = 'block';
    renderStats();
    renderTable();
  };
  reader.readAsArrayBuffer(file);
}

function resetUpload() {
  customers = [];
  filter = 'all';
  document.getElementById('upload-section').style.display = 'block';
  document.getElementById('data-section').style.display = 'none';
  document.getElementById('file-input').value = '';
}

function isInvoice(ref) { return /^INV\//i.test(ref); }
function isReturn(ref) { return /^RRIV\//i.test(ref) || /مرتجع/i.test(ref); }
function isPayment(ref, comm) {
  return /payment|سداد/i.test(ref) || /payment|سداد/i.test(comm || '') ||
    /^CHSJB|^RCEV|^RCV/i.test(ref);
}

function parseDate(val) {
  if (!val || val === 'NaN' || val === '' || val === 'null') return null;
  if (val instanceof Date) return val;
  // Try direct parse
  const d = new Date(val);
  if (!isNaN(d)) return d;
  // Arabic month names
  const arMonths = {
    'يناير':0,'فبراير':1,'مارس':2,'أبريل':3,'مايو':4,'يونيو':5,
    'يوليو':6,'أغسطس':7,'سبتمبر':8,'أكتوبر':9,'نوفمبر':10,'ديسمبر':11,
    'كانون الثاني':0,'شباط':1,'آذار':2,'نيسان':3,'أيار':4,'حزيران':5,
    'تموز':6,'آب':7,'أيلول':8,'تشرين الأول':9,'تشرين الثاني':10,'كانون الأول':11
  };
  const m = String(val).match(/(\d+)\s+(.+?),?\s+(\d{4})$/);
  if (m) {
    const monthName = m[2].trim();
    const monthIdx = arMonths[monthName];
    if (monthIdx !== undefined) return new Date(parseInt(m[3]), monthIdx, parseInt(m[1]));
  }
  return null;
}

function fmtDate(d) {
  if (!d) return '—';
  return `${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}`;
}

function fmtNum(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-GB');
}

function parseRows(rows) {
  const result = [];
  let currentCustomer = null;
  let currentId = null;

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const ref = String(row[0] || '').trim();
    const dateRaw = row[1];
    const comm = String(row[2] || '').trim();
    const debit = parseFloat(String(row[7] || '').replace(/,/g,'')) || 0;
    const credit = parseFloat(String(row[8] || '').replace(/,/g,'')) || 0;
    const balance = parseFloat(String(row[9] || '').replace(/,/g,''));

    // Header row
    if (ref === '' || ref === 'nan' || /^date$/i.test(ref) || /^التاريخ$/.test(ref)) continue;

    // Detect customer header row (no date, has balance in col 9, starts with digits or Arabic name)
    const isCustomerHeader = !dateRaw && !isNaN(balance) && 
      !/^(Total|إجمالي|الإجمالي|Initial|الرصيد)/i.test(ref) &&
      (row[7] || row[8] || row[9]) &&
      !isInvoice(ref) && !isReturn(ref) && !isPayment(ref, comm) &&
      !/^CHSJB|^RCEV|^RCV|^WHKH/i.test(ref);

    if (isCustomerHeader) {
      // Extract ID if present (leading digits)
      const idMatch = ref.match(/^(\d+)\s+(.+)/);
      currentId = idMatch ? idMatch[1] : '';
      currentCustomer = {
        id: currentId,
        name: idMatch ? idMatch[2].trim() : ref,
        balance: isNaN(balance) ? 0 : balance,
        transactions: [],
        lastInvoice: null, lastInvoiceDate: null,
        lastPayment: null, lastPaymentDate: null,
        lastReturn: null, lastReturnDate: null,
      };
      result.push(currentCustomer);
      continue;
    }

    // Skip total rows and initial balance
    if (/^(Total|إجمالي|الإجمالي|Initial|الرصيد الافتتاحي)/i.test(ref)) {
      if (/^(Total|إجمالي|الإجمالي)/i.test(ref)) currentCustomer = null;
      continue;
    }

    if (!currentCustomer) continue;

    const date = parseDate(dateRaw);

    // Classify transaction
    let type = 'other';
    if (isInvoice(ref)) type = 'invoice';
    else if (isReturn(ref)) type = 'return';
    else if (isPayment(ref, comm)) type = 'payment';

    currentCustomer.transactions.push({ ref, date, comm, debit, credit, type, balance: isNaN(balance) ? null : balance });

    if (type === 'invoice' && date) {
      if (!currentCustomer.lastInvoiceDate || date > currentCustomer.lastInvoiceDate) {
        currentCustomer.lastInvoiceDate = date;
        currentCustomer.lastInvoice = credit || debit;
      }
    }
    if (type === 'return' && date) {
      if (!currentCustomer.lastReturnDate || date > currentCustomer.lastReturnDate) {
        currentCustomer.lastReturnDate = date;
        currentCustomer.lastReturn = debit || credit;
      }
    }
    if (type === 'payment' && date) {
      if (!currentCustomer.lastPaymentDate || date > currentCustomer.lastPaymentDate) {
        currentCustomer.lastPaymentDate = date;
        currentCustomer.lastPayment = credit || debit;
      }
    }
  }
  return result;
}

function setFilter(f) {
  filter = f;
  ['all','balance','zero'].forEach(k => {
    const id = k === 'all' ? 'f-all' : k === 'balance' ? 'f-balance' : 'f-zero';
    document.getElementById(id).classList.toggle('active', filter === k);
  });
  renderTable();
}

function closePrint() {
  document.getElementById('print-overlay').classList.remove('show');
}

function printTable() {
  const isRtl = lang === 'ar';
  const cols = t('cols');
  const search = document.getElementById('search').value.toLowerCase();

  let data = customers.filter(c => {
    if (filter === 'balance' && c.balance <= 0) return false;
    if (filter === 'zero' && c.balance > 0) return false;
    if (search && !c.name.toLowerCase().includes(search) && !c.id.includes(search)) return false;
    return true;
  });

  if (sortField) {
    data.sort((a, b) => {
      const av = getSortValue(a, sortField), bv = getSortValue(b, sortField);
      if (av < bv) return -1 * sortDir;
      if (av > bv) return 1 * sortDir;
      return 0;
    });
  }

  const frame = document.getElementById('print-frame');
  frame.classList.toggle('rtl', isRtl);
  frame.style.direction = isRtl ? 'rtl' : 'ltr';

  document.getElementById('print-title').textContent = isRtl ? 'دفتر الأستاذ العام — تحليل العملاء' : 'General Ledger — Customer Analysis';

  const now = new Date();
  const dateStr = `${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}`;
  const filterLabel = filter === 'balance' ? (isRtl ? 'لديه رصيد' : 'With balance') : filter === 'zero' ? (isRtl ? 'لا رصيد' : 'Zero balance') : (isRtl ? 'الكل' : 'All');
  document.getElementById('print-meta').textContent = (isRtl ? 'تاريخ الطباعة: ' : 'Printed: ') + dateStr + '  |  ' + (isRtl ? 'الفلتر: ' : 'Filter: ') + filterLabel + '  |  ' + (isRtl ? 'العدد: ' : 'Count: ') + data.length;

  const total = data.length;
  const withBal = data.filter(c => c.balance > 0).length;
  const totalBal = data.reduce((s, c) => s + (c.balance || 0), 0);
  document.getElementById('print-summary').innerHTML = `
    <div class="ps-card"><div class="ps-label">${isRtl ? 'العملاء' : 'Customers'}</div><div class="ps-val">${total}</div></div>
    <div class="ps-card"><div class="ps-label">${isRtl ? 'لديهم رصيد' : 'With balance'}</div><div class="ps-val" style="color:#d03030">${withBal}</div></div>
    <div class="ps-card"><div class="ps-label">${isRtl ? 'مسدد' : 'Cleared'}</div><div class="ps-val" style="color:#1a9951">${total - withBal}</div></div>
    <div class="ps-card"><div class="ps-label">${isRtl ? 'إجمالي الأرصدة' : 'Total balance'}</div><div class="ps-val">${fmtNum(totalBal)}</div></div>
  `;

  document.getElementById('print-thead').innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;

  document.getElementById('print-tbody').innerHTML = data.map((c, i) => {
    const balCls = c.balance > 0 ? 'bal-pos' : 'bal-zero';
    return `<tr>
      <td>${c.name}${c.id ? ` <span style="font-size:11px;color:#888">(${c.id})</span>` : ''}</td>
      <td class="${balCls}">${fmtNum(c.balance)}</td>
      <td>${fmtNum(c.lastInvoice)}</td>
      <td>${fmtDate(c.lastInvoiceDate)}</td>
      <td>${fmtNum(c.lastPayment)}</td>
      <td>${fmtDate(c.lastPaymentDate)}</td>
    </tr>`;
  }).join('');

  document.getElementById('print-overlay').classList.add('show');
}

function renderStats() {
  const total = customers.length;
  const withBal = customers.filter(c => c.balance > 0).length;
  const zeroBal = total - withBal;
  const totalBal = customers.reduce((s, c) => s + (c.balance || 0), 0);
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">${t('totalCustomers')}</div>
      <div class="stat-value accent">${total}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">${t('withBalance')}</div>
      <div class="stat-value red">${withBal}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">${t('noBalance')}</div>
      <div class="stat-value green">${zeroBal}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">${t('totalBalance')}</div>
      <div class="stat-value">${fmtNum(totalBal)}</div>
    </div>
  `;
}

function sortBy(field) {
  if (sortField === field) sortDir *= -1;
  else { sortField = field; sortDir = 1; }
  renderTable();
}

function getSortValue(c, field) {
  switch(field) {
    case 'name':    return c.name.toLowerCase();
    case 'balance': return c.balance || 0;
    case 'lastInvoice': return c.lastInvoice || 0;
    case 'lastInvoiceDate': return c.lastInvoiceDate ? c.lastInvoiceDate.getTime() : 0;
    case 'lastPayment': return c.lastPayment || 0;
    case 'lastPaymentDate': return c.lastPaymentDate ? c.lastPaymentDate.getTime() : 0;
    default: return 0;
  }
}

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  let data = customers.filter(c => {
    if (filter === 'balance' && c.balance <= 0) return false;
    if (filter === 'zero' && c.balance > 0) return false;
    if (search && !c.name.toLowerCase().includes(search) && !c.id.includes(search)) return false;
    return true;
  });

  if (sortField) {
    data.sort((a, b) => {
      const av = getSortValue(a, sortField), bv = getSortValue(b, sortField);
      if (av < bv) return -1 * sortDir;
      if (av > bv) return 1 * sortDir;
      return 0;
    });
  }

  const cols = t('cols');
  const fields = ['name','balance','lastInvoice','lastInvoiceDate','lastPayment','lastPaymentDate'];
  const arrow = (f) => {
    if (sortField !== f) return `<span class="sort-arrow">⇅</span>`;
    return `<span class="sort-arrow active">${sortDir === 1 ? '↑' : '↓'}</span>`;
  };
  document.getElementById('table-head').innerHTML =
    `<th></th>` +
    cols.map((c, i) => {
      const f = fields[i];
      const active = sortField === f ? ' sort-active' : '';
      return `<th class="sortable${active}" onclick="sortBy('${f}')">${c}${arrow(f)}</th>`;
    }).join('');

  const tbody = document.getElementById('table-body');
  if (data.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('empty-msg').style.display = 'block';
    return;
  }
  document.getElementById('empty-msg').style.display = 'none';

  let html = '';
  data.forEach((c, idx) => {
    const balClass = c.balance > 0 ? 'red' : c.balance === 0 ? 'zero' : 'positive';
    const balBadge = c.balance > 0
      ? `<span class="badge badge-red">●</span>`
      : `<span class="badge badge-green">✓</span>`;

    html += `
      <tr onclick="toggleExpand(${idx})" id="row-${idx}">
        <td style="width:30px;"><span class="chev" id="chev-${idx}">▶</span></td>
        <td>
          <div class="customer-name">${c.name}</div>
          ${c.id ? `<div class="customer-id">${c.id}</div>` : ''}
        </td>
        <td><span class="amount ${balClass}">${fmtNum(c.balance)}</span> ${balBadge}</td>
        <td><span class="amount">${fmtNum(c.lastInvoice)}</span></td>
        <td><span class="date-text">${fmtDate(c.lastInvoiceDate)}</span></td>
        <td><span class="amount green">${fmtNum(c.lastPayment)}</span></td>
        <td><span class="date-text">${fmtDate(c.lastPaymentDate)}</span></td>
      </tr>
      <tr class="expand-row" id="expand-${idx}">
        <td colspan="7" class="expand-cell">
          ${buildExpandContent(c)}
        </td>
      </tr>
    `;
  });
  tbody.innerHTML = html;
}

function buildExpandContent(c) {
  const txnRows = c.transactions.slice().sort((a,b) => (b.date||0) - (a.date||0)).slice(0, 20).map(tx => {
    const typeLabel = tx.type === 'invoice' ? t('typeInvoice') : tx.type === 'return' ? t('typeReturn') : tx.type === 'payment' ? t('typePayment') : t('typeOther');
    const typeBadge = tx.type === 'invoice' ? 'badge-red' : tx.type === 'return' ? 'badge-gray' : tx.type === 'payment' ? 'badge-green' : 'badge-gray';
    return `<tr>
      <td style="color:var(--text2);font-size:12px;">${tx.ref}</td>
      <td>${fmtDate(tx.date)}</td>
      <td><span class="badge ${typeBadge}">${typeLabel}</span></td>
      <td class="debit">${tx.debit > 0 ? fmtNum(tx.debit) : ''}</td>
      <td class="credit">${tx.credit > 0 ? fmtNum(tx.credit) : ''}</td>
    </tr>`;
  }).join('');

  return `
    <div class="expand-inner">
      <div class="detail-block">
        <div class="detail-label">${t('detBalance')}</div>
        <div class="detail-value" style="color:${c.balance > 0 ? 'var(--red)' : 'var(--green)'}; font-size:18px; font-weight:700;">${fmtNum(c.balance)}</div>
      </div>
      <div class="detail-block">
        <div class="detail-label">${t('detInvoice')}</div>
        <div class="detail-value">${fmtNum(c.lastInvoice)}</div>
        <div class="detail-label" style="margin-top:4px;">${t('detInvDate')}</div>
        <div class="detail-value">${fmtDate(c.lastInvoiceDate)}</div>
      </div>
      <div class="detail-block">
        <div class="detail-label">${t('detPayment')}</div>
        <div class="detail-value" style="color:var(--green);">${fmtNum(c.lastPayment)}</div>
        <div class="detail-label" style="margin-top:4px;">${t('detPayDate')}</div>
        <div class="detail-value">${fmtDate(c.lastPaymentDate)}</div>
      </div>
    </div>
    <div style="padding: 0 20px 16px;">
      <div class="mini-section-title">${t('detTxn')}</div>
      <table class="mini-table">
        <thead><tr>
          <th>${t('txnRef')}</th><th>${t('txnDate')}</th><th>${t('txnType')}</th>
          <th>${t('txnDebit')}</th><th>${t('txnCredit')}</th>
        </tr></thead>
        <tbody>${txnRows}</tbody>
      </table>
    </div>
  `;
}

function toggleExpand(idx) {
  const row = document.getElementById(`expand-${idx}`);
  const chev = document.getElementById(`chev-${idx}`);
  if (row.classList.contains('open')) {
    row.classList.remove('open');
    chev.classList.remove('open');
  } else {
    // close others
    document.querySelectorAll('.expand-row.open').forEach(r => r.classList.remove('open'));
    document.querySelectorAll('.chev.open').forEach(c => c.classList.remove('open'));
    row.classList.add('open');
    chev.classList.add('open');
  }
}

applyLang();
</script>
</body>
</html>
